<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- background rounded square -->
  <rect x="3" y="3" width="58" height="58" rx="11" fill="#fff4f7" stroke="#1a0b2e" stroke-width="3"/>
  <!-- hard shadow rectangles for y2k chunky feel -->
  <rect x="7" y="7" width="50" height="6" rx="3" fill="#ff2d95" opacity="0.18"/>
  <rect x="7" y="51" width="50" height="6" rx="3" fill="#6ee7ff" opacity="0.18"/>
  <!-- screen -->
  <rect x="9" y="11" width="46" height="16" rx="3" fill="#1a0b2e" stroke="#ff2d95" stroke-width="2"/>
  <text x="47" y="23" text-anchor="end" font-family="'Press Start 2P', 'Courier New', monospace" font-size="12" font-weight="bold" fill="#fff76e">00</text>
  <!-- pink stripe -->
  <rect x="9" y="29" width="46" height="2" fill="#ff2d95"/>
  <!-- keypad: 4 columns x 3 rows, y2k color palette -->
  <g>
    <!-- row 1 -->
    <rect x="9"  y="33" width="9" height="8" rx="2" fill="#ff6fbd" stroke="#1a0b2e" stroke-width="2"/>
    <rect x="21" y="33" width="9" height="8" rx="2" fill="#6ee7ff" stroke="#1a0b2e" stroke-width="2"/>
    <rect x="33" y="33" width="9" height="8" rx="2" fill="#fff76e" stroke="#1a0b2e" stroke-width="2"/>
    <rect x="45" y="33" width="10" height="8" rx="2" fill="#c8a2ff" stroke="#1a0b2e" stroke-width="2"/>
    <!-- row 2 -->
    <rect x="9"  y="43" width="9" height="8" rx="2" fill="#fff76e" stroke="#1a0b2e" stroke-width="2"/>
    <rect x="21" y="43" width="9" height="8" rx="2" fill="#c8a2ff" stroke="#1a0b2e" stroke-width="2"/>
    <rect x="33" y="43" width="9" height="8" rx="2" fill="#ff6fbd" stroke="#1a0b2e" stroke-width="2"/>
    <rect x="45" y="43" width="10" height="8" rx="2" fill="#6ee7ff" stroke="#1a0b2e" stroke-width="2"/>
    <!-- row 3 -->
    <rect x="9"  y="53" width="9" height="8" rx="2" fill="#6ee7ff" stroke="#1a0b2e" stroke-width="2"/>
    <rect x="21" y="53" width="9" height="8" rx="2" fill="#ff6fbd" stroke="#1a0b2e" stroke-width="2"/>
    <rect x="33" y="53" width="9" height="8" rx="2" fill="#c8a2ff" stroke="#1a0b2e" stroke-width="2"/>
    <rect x="45" y="53" width="10" height="8" rx="2" fill="#fff76e" stroke="#1a0b2e" stroke-width="2"/>
  </g>
  <!-- tiny plus star on top-right corner -->
  <circle cx="53" cy="9" r="2" fill="#ff2d95"/>
</svg>
